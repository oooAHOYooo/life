<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Movies to See - LifeOS</title>
        <link rel="stylesheet" href="../styles.css">
        <link rel="stylesheet" href="../design-system.css">
        <style>
            .back-link {
                display: inline-block;
                margin-bottom: 20px;
                color: var(--color-accent-1);
                text-decoration: none;
                font-weight: 500;
                transition: color 0.3s ease;
            }
            .back-link:hover {
                color: var(--color-accent-2);
                text-decoration: underline;
            }

            /* Flix Reviews Style Header */
            .movies-header {
                background: rgba(30, 41, 59, 0.8);
                backdrop-filter: blur(20px);
                border: 2px solid var(--color-border-1);
                border-radius: var(--radius-2);
                padding: 30px;
                margin-bottom: 40px;
                text-align: center;
            }

            .movies-header h1 {
                font-size: clamp(2rem, 5vw, 3rem);
                font-weight: 700;
                background: linear-gradient(135deg, var(--color-accent-1) 0%, var(--color-accent-2) 50%, var(--color-accent-3) 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                margin-bottom: 10px;
            }

            .movies-header p {
                color: var(--color-text-muted);
                font-size: 1.1rem;
            }

            /* Month Sections */
            .month-section {
                margin-bottom: 50px;
            }

            .month-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 25px;
                padding-bottom: 15px;
                border-bottom: 2px solid var(--color-border-2);
            }

            .month-title {
                font-size: 1.8rem;
                font-weight: 600;
                color: var(--color-text);
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .month-count {
                background: var(--color-accent-1);
                color: white;
                padding: 6px 14px;
                border-radius: 20px;
                font-size: 0.9rem;
                font-weight: 600;
            }

            /* Movies Grid */
            .movies-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 25px;
                margin-bottom: 30px;
            }

            .movie-card {
                background: var(--color-card-bg-soft);
                backdrop-filter: blur(20px);
                border: 2px solid var(--color-border-1);
                border-radius: var(--radius-2);
                overflow: hidden;
                transition: all 0.3s ease;
                cursor: pointer;
                position: relative;
            }

            .movie-card:hover {
                transform: translateY(-5px);
                border-color: var(--color-border-3);
                box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
            }

            .movie-card.watched {
                opacity: 0.6;
            }

            .movie-card.watched::after {
                content: '✓';
                position: absolute;
                top: 10px;
                right: 10px;
                background: #22c55e;
                color: white;
                width: 30px;
                height: 30px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: bold;
                font-size: 1.2rem;
                z-index: 2;
                box-shadow: 0 2px 10px rgba(34, 197, 94, 0.5);
            }

            .movie-poster {
                width: 100%;
                height: 300px;
                object-fit: cover;
                background: rgba(15, 23, 42, 0.6);
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--color-text-muted);
                font-size: 0.9rem;
            }

            .movie-poster img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .movie-poster .placeholder {
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2));
                color: var(--color-text-muted);
                font-size: 0.9rem;
            }

            .movie-info {
                padding: 15px;
            }

            .movie-title {
                font-size: 1rem;
                font-weight: 600;
                color: var(--color-text);
                margin-bottom: 8px;
                line-height: 1.3;
                min-height: 2.6em;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }

            .movie-rating {
                display: flex;
                align-items: center;
                gap: 5px;
                margin-bottom: 12px;
                color: #fbbf24;
            }

            .movie-rating .star {
                font-size: 1rem;
            }

            .movie-rating .rating-value {
                color: var(--color-text);
                font-weight: 600;
                margin-left: 3px;
            }

            .movie-actions {
                display: flex;
                gap: 8px;
            }

            .watch-btn {
                flex: 1;
                background: #dc2626;
                color: white;
                border: none;
                padding: 10px 16px;
                border-radius: 6px;
                font-size: 0.9rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .watch-btn:hover {
                background: #b91c1c;
                transform: scale(1.05);
            }

            .watch-btn.watched {
                background: #22c55e;
            }

            .watch-btn.watched:hover {
                background: #16a34a;
            }

            .empty-month {
                text-align: center;
                padding: 40px;
                color: var(--color-text-muted);
                background: var(--color-card-bg-soft);
                border: 2px dashed var(--color-border-1);
                border-radius: var(--radius-2);
            }

            .rollover-info {
                background: rgba(99, 102, 241, 0.15);
                border: 1px solid var(--color-border-2);
                border-radius: var(--radius-2);
                padding: 15px;
                margin-bottom: 20px;
                color: var(--color-text-muted);
                font-size: 0.9rem;
            }

            .rollover-info strong {
                color: var(--color-accent-1);
            }

            .rollover-info code {
                background: rgba(15, 23, 42, 0.6);
                padding: 2px 6px;
                border-radius: 4px;
                font-family: 'Courier New', monospace;
                font-size: 0.85em;
                color: var(--color-accent-2);
            }

            @media (max-width: 768px) {
                .movies-grid {
                    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                    gap: 15px;
                }

                .movie-poster {
                    height: 225px;
                }

                .month-header {
                    flex-direction: column;
                    align-items: flex-start;
                    gap: 10px;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <a href="../index.html" class="back-link">← Back to LifeOS</a>

            <div class="movies-header">
                <h1>Movies to See</h1>
                <p>Track movies you want to watch, organized by month</p>
            </div>

            <div class="rollover-info" id="rolloverInfo" style="display: none;">
                <strong>Note:</strong> Unwatched movies from previous months are automatically shown in the current month. 
                To persist changes, update <code>data/movies-to-see.json</code> manually.
            </div>

            <div id="moviesContainer">
                <!-- Movies will be loaded here -->
            </div>
        </div>

        <script>
        class MoviesPage {
            constructor() {
                this.movies = {};
                this.init();
            }

            async init() {
                await this.loadData();
                this.loadFromLocalStorage();
                this.processRollover();
                this.renderMovies();
            }

            async loadData() {
                try {
                    const response = await fetch('../data/movies-to-see.json');
                    this.movies = await response.json();
                } catch (error) {
                    console.error('Error loading movies:', error);
                    this.showError('Failed to load movies data.');
                }
            }

            processRollover() {
                const now = new Date();
                const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
                const lastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                const lastMonthKey = `${lastMonth.getFullYear()}-${String(lastMonth.getMonth() + 1).padStart(2, '0')}`;

                // Get all month keys and sort them
                const monthKeys = Object.keys(this.movies).sort();
                
                // For each past month, move unwatched movies to current month
                monthKeys.forEach(monthKey => {
                    if (monthKey < currentMonth && this.movies[monthKey]) {
                        const unwatched = this.movies[monthKey].filter(m => !m.watched);
                        
                        if (unwatched.length > 0) {
                            // Initialize current month if it doesn't exist
                            if (!this.movies[currentMonth]) {
                                this.movies[currentMonth] = [];
                            }
                            
                            // Add unwatched movies to current month (avoid duplicates)
                            unwatched.forEach(movie => {
                                const exists = this.movies[currentMonth].some(m => m.title === movie.title);
                                if (!exists) {
                                    this.movies[currentMonth].push(movie);
                                }
                            });
                            
                            // Remove unwatched from old month
                            this.movies[monthKey] = this.movies[monthKey].filter(m => m.watched);
                        }
                    }
                });
            }

            renderMovies() {
                const container = document.getElementById('moviesContainer');
                
                // Get all months, sorted (newest first)
                const monthKeys = Object.keys(this.movies).sort((a, b) => b.localeCompare(a));
                
                if (monthKeys.length === 0) {
                    container.innerHTML = '<div class="empty-state"><h3>No movies yet</h3><p>Add movies to your movies-to-see.json file</p></div>';
                    return;
                }

                // Show rollover info if there are unwatched movies from previous months
                const now = new Date();
                const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
                const hasRollover = monthKeys.some(key => key < currentMonth && this.movies[key]?.some(m => !m.watched));
                const rolloverInfo = document.getElementById('rolloverInfo');
                if (rolloverInfo) {
                    rolloverInfo.style.display = hasRollover ? 'block' : 'none';
                }

                let html = '';

                monthKeys.forEach(monthKey => {
                    const movies = this.movies[monthKey] || [];
                    const monthDate = new Date(monthKey + '-01');
                    const monthName = monthDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                    
                    const watchedCount = movies.filter(m => m.watched).length;
                    const totalCount = movies.length;
                    const unwatchedCount = totalCount - watchedCount;

                    html += `
                        <div class="month-section">
                            <div class="month-header">
                                <h2 class="month-title">${this.escapeHtml(monthName)}</h2>
                                <span class="month-count">${totalCount} ${totalCount === 1 ? 'movie' : 'movies'} 
                                    ${unwatchedCount > 0 ? `(${unwatchedCount} unwatched)` : '(all watched!)'}
                                </span>
                            </div>
                            
                            ${movies.length === 0 ? `
                                <div class="empty-month">
                                    <p>No movies added for this month yet</p>
                                </div>
                            ` : `
                                <div class="movies-grid">
                                    ${movies.map(movie => this.renderMovieCard(movie, monthKey)).join('')}
                                </div>
                            `}
                        </div>
                    `;
                });

                container.innerHTML = html;
                this.attachEventListeners();
            }

            renderMovieCard(movie, monthKey) {
                const watchedClass = movie.watched ? 'watched' : '';
                const posterImg = movie.poster 
                    ? `<img src="${this.escapeHtml(movie.poster)}" alt="${this.escapeHtml(movie.title)}" onerror="this.parentElement.innerHTML='<div class=\\'placeholder\\'>No Poster</div>'">`
                    : '<div class="placeholder">No Poster</div>';
                
                const ratingHtml = movie.rating 
                    ? `<div class="movie-rating"><span class="star">★</span><span class="rating-value">${movie.rating}</span></div>`
                    : '';

                return `
                    <div class="movie-card ${watchedClass}" data-movie-title="${this.escapeHtml(movie.title)}" data-month="${monthKey}">
                        <div class="movie-poster">
                            ${posterImg}
                        </div>
                        <div class="movie-info">
                            <h3 class="movie-title">${this.escapeHtml(movie.title)}</h3>
                            ${ratingHtml}
                            <div class="movie-actions">
                                <button class="watch-btn ${movie.watched ? 'watched' : ''}" 
                                        data-movie-title="${this.escapeHtml(movie.title)}" 
                                        data-month="${monthKey}">
                                    ${movie.watched ? 'Watched' : 'Mark Watched'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            attachEventListeners() {
                const watchButtons = document.querySelectorAll('.watch-btn');
                watchButtons.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const movieTitle = btn.getAttribute('data-movie-title');
                        const monthKey = btn.getAttribute('data-month');
                        this.toggleWatched(movieTitle, monthKey);
                    });
                });
            }

            toggleWatched(movieTitle, monthKey) {
                const movie = this.movies[monthKey]?.find(m => m.title === movieTitle);
                if (!movie) return;

                movie.watched = !movie.watched;
                if (movie.watched) {
                    movie.watchedDate = new Date().toISOString().split('T')[0];
                } else {
                    movie.watchedDate = null;
                    movie.rating = null;
                }

                // Save to localStorage for persistence across page reloads
                this.saveToLocalStorage();

                // Re-render to update UI
                this.renderMovies();
                
                // Show a temporary notification
                this.showNotification(movie.watched ? 'Marked as watched!' : 'Marked as unwatched');
            }

            saveToLocalStorage() {
                try {
                    localStorage.setItem('movies-to-see', JSON.stringify(this.movies));
                } catch (e) {
                    console.warn('Could not save to localStorage:', e);
                }
            }

            loadFromLocalStorage() {
                try {
                    const stored = localStorage.getItem('movies-to-see');
                    if (stored) {
                        const storedMovies = JSON.parse(stored);
                        // Merge with loaded data, prioritizing stored changes
                        Object.keys(storedMovies).forEach(month => {
                            if (this.movies[month]) {
                                // Update existing movies
                                storedMovies[month].forEach(storedMovie => {
                                    const existing = this.movies[month].find(m => m.title === storedMovie.title);
                                    if (existing) {
                                        Object.assign(existing, storedMovie);
                                    } else {
                                        this.movies[month].push(storedMovie);
                                    }
                                });
                            } else {
                                this.movies[month] = storedMovies[month];
                            }
                        });
                    }
                } catch (e) {
                    console.warn('Could not load from localStorage:', e);
                }
            }

            showNotification(message) {
                // Create a simple notification
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    background: var(--color-accent-1);
                    color: white;
                    padding: 15px 25px;
                    border-radius: 8px;
                    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
                    z-index: 1000;
                    animation: slideIn 0.3s ease;
                `;
                notification.textContent = message;
                document.body.appendChild(notification);

                setTimeout(() => {
                    notification.style.animation = 'slideOut 0.3s ease';
                    setTimeout(() => notification.remove(), 300);
                }, 2000);
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            showError(message) {
                const container = document.querySelector('.container');
                container.innerHTML = `
                    <div class="error-state">
                        <h2>Error</h2>
                        <p>${message}</p>
                        <button onclick="location.reload()">Reload Page</button>
                    </div>
                `;
            }
        }

        // Add CSS animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            @keyframes slideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Initialize the page when it loads
        document.addEventListener('DOMContentLoaded', () => {
            new MoviesPage();
        });
    </script>
    </body>
</html>
