<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Health - LifeOS</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet" media="print" onload="this.media='all'">
        <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"></noscript>
        <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1419 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #e8eaed;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(52, 211, 153, 0.10) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(56, 189, 248, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 28px 20px 60px;
            position: relative;
            z-index: 1;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 28px;
            color: #6b7280;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-link:hover { color: #34d399; }

        header { margin-bottom: 36px; }
        header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #f1f5f9;
            letter-spacing: -0.02em;
        }
        header p {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .section-title {
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #475569;
            margin-bottom: 14px;
        }

        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-bottom: 36px;
        }

        .hub-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 14px;
            padding: 22px 20px;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: all 0.2s;
            cursor: pointer;
        }
        .hub-card:hover {
            background: rgba(255,255,255,0.07);
            border-color: rgba(255,255,255,0.16);
            transform: translateY(-2px);
        }
        .hub-card .icon {
            font-size: 1.6rem;
            margin-bottom: 10px;
            line-height: 1;
        }
        .hub-card .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .hub-card .card-desc {
            font-size: 0.82rem;
            color: #64748b;
            line-height: 1.5;
        }
        .hub-card .card-stat {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.07);
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .hub-card .card-stat span {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .breath-card { border-color: rgba(56, 189, 248, 0.25); }
        .breath-card:hover { border-color: rgba(56, 189, 248, 0.45); }
        .breath-card .card-stat span { color: #38bdf8; }

        .summary-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 16px;
        }
        .summary-card h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .recent-episode {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .recent-episode:last-child { border-bottom: none; }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 5px;
            flex-shrink: 0;
        }
        .dot-mild     { background: #4ade80; }
        .dot-moderate { background: #facc15; }
        .dot-severe   { background: #f87171; }
        .ep-time { font-size: 0.78rem; color: #64748b; }
        .ep-note { font-size: 0.88rem; color: #cbd5e1; margin-top: 1px; }

        .empty { color: #475569; font-size: 0.88rem; padding: 10px 0; }
        </style>
    </head>
    <body>
        <div class="container">
            <a href="../index.html" class="back-link">← Back to LifeOS</a>
            <header>
                <h1>Health</h1>
                <p>Patient-generated health data — symptom logs and tracking for clinical reference.</p>
            </header>

            <div class="section-title">Trackers</div>
            <div class="hub-grid">
                <a class="hub-card breath-card" href="breathing-log.html">
                    <div class="icon">🫁</div>
                    <div class="card-title">Breathing Log</div>
                    <div class="card-desc">Log and review shortness of breath episodes — when, how severe, and what helped.</div>
                    <div class="card-stat" id="breathStat"><span>—</span> episodes logged</div>
                </a>
            </div>

            <div class="section-title">Recent Breathing Episodes</div>
            <div class="summary-card">
                <div id="recentEpisodes"><div class="empty">Loading...</div></div>
            </div>
        </div>

        <script>
        const DATA_KEY = 'breathingLog_v1';

        function fmtDatetime(iso) {
            const d = new Date(iso);
            return d.toLocaleString('en-US', {
                month: 'short', day: 'numeric',
                hour: 'numeric', minute: '2-digit', hour12: true
            });
        }

        async function loadBreathingData() {
            const saved = localStorage.getItem(DATA_KEY);
            if (saved) return JSON.parse(saved);
            try {
                const res = await fetch('../data/breathing-log.json');
                return await res.json();
            } catch { return []; }
        }

        async function render() {
            const entries = await loadBreathingData();

            document.getElementById('breathStat').innerHTML =
                `<span>${entries.length}</span> episode${entries.length !== 1 ? 's' : ''} logged`;

            const recentEl = document.getElementById('recentEpisodes');
            if (!entries.length) {
                recentEl.innerHTML = '<div class="empty">No episodes logged yet. <a href="breathing-log.html" style="color:#38bdf8">Log one now.</a></div>';
                return;
            }

            const sorted = [...entries]
                .sort((a, b) => new Date(b.datetime) - new Date(a.datetime))
                .slice(0, 5);

            recentEl.innerHTML = sorted.map(e => `
                <div class="recent-episode">
                    <div class="dot dot-${e.severity}"></div>
                    <div>
                        <div class="ep-time">${fmtDatetime(e.datetime)} &mdash; <strong style="color:#94a3b8">${e.severity}</strong></div>
                        <div class="ep-note">${e.notes || '<em style="color:#475569">No notes</em>'}</div>
                    </div>
                </div>
            `).join('');
        }

        render();
        </script>
    </body>
</html>
