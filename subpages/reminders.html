<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Reminders & Upkeep</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet" media="print" onload="this.media='all'">
        <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"></noscript>
        <link rel="stylesheet" href="../design-system.css">
        <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1419 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #e8eaed;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.09) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.07) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 28px 20px 48px;
            position: relative;
            z-index: 1;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 28px;
            color: #6b7280;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-link:hover { color: #818cf8; }

        header {
            margin-bottom: 32px;
        }
        header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #e8eaed;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }
        header p {
            color: #6b7280;
            font-size: 0.875rem;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }
        .controls input, .controls select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #e8eaed;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.875rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .controls input:focus, .controls select:focus {
            border-color: rgba(99, 102, 241, 0.5);
        }
        .controls input { flex: 1; min-width: 180px; }
        .controls select option { background: #1a1f3a; }

        /* Section (month group) */
        .month-section {
            margin-bottom: 32px;
        }
        .month-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .month-label-text {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6366f1;
        }
        .month-label-line {
            flex: 1;
            height: 1px;
            background: rgba(99, 102, 241, 0.15);
        }
        .month-label-count {
            font-size: 0.72rem;
            color: #4b5563;
            font-weight: 500;
        }

        /* Reminder row */
        .reminder-row {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.45);
            border: 1px solid rgba(99, 102, 241, 0.12);
            border-radius: 10px;
            margin-bottom: 6px;
            transition: border-color 0.2s, background 0.2s;
        }
        .reminder-row:hover {
            border-color: rgba(99, 102, 241, 0.28);
            background: rgba(15, 23, 42, 0.65);
        }
        .reminder-row.status-overdue { border-left: 3px solid rgba(239, 68, 68, 0.6); }
        .reminder-row.status-soon    { border-left: 3px solid rgba(251, 191, 36, 0.6); }
        .reminder-row.status-ok      { border-left: 3px solid rgba(34, 197, 94, 0.4); }

        .reminder-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 6px;
            flex-shrink: 0;
        }
        .dot-ok      { background: #22c55e; }
        .dot-soon    { background: #fbbf24; }
        .dot-overdue { background: #ef4444; }

        .reminder-main { flex: 1; min-width: 0; }
        .reminder-name {
            font-weight: 600;
            color: #e8eaed;
            font-size: 0.925rem;
            margin-bottom: 2px;
        }
        .reminder-meta {
            font-size: 0.8rem;
            color: #6b7280;
            margin-bottom: 4px;
        }
        .reminder-notes {
            font-size: 0.8rem;
            color: #9ca3af;
            margin-top: 4px;
            line-height: 1.4;
        }
        .reminder-action-pill {
            display: inline-block;
            font-size: 0.75rem;
            color: #818cf8;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 999px;
            padding: 2px 8px;
            margin-top: 5px;
        }

        .reminder-right {
            text-align: right;
            flex-shrink: 0;
        }
        .reminder-date {
            font-size: 0.8rem;
            color: #c7d2fe;
            font-weight: 500;
            white-space: nowrap;
        }
        .reminder-days {
            font-size: 0.75rem;
            color: #4b5563;
            margin-top: 2px;
        }
        .reminder-days.soon    { color: #fbbf24; }
        .reminder-days.overdue { color: #f87171; }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 6px;
        }
        .badge-ok      { background: rgba(34,197,94,0.15);  color: #86efac; border: 1px solid rgba(34,197,94,0.3); }
        .badge-soon    { background: rgba(251,191,36,0.15); color: #fde68a; border: 1px solid rgba(251,191,36,0.3); }
        .badge-overdue { background: rgba(239,68,68,0.15);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }

        /* Empty state */
        .empty { color: #4b5563; font-size: 0.875rem; padding: 12px 0; }

        /* Count note */
        .count-note { font-size: 0.8rem; color: #4b5563; margin-top: 4px; }

        /* Today's Capture */
        .capture-section {
            margin-bottom: 36px;
        }
        .capture-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 12px;
        }
        .capture-title {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #a78bfa;
        }
        .capture-date {
            font-size: 0.72rem;
            color: #4b5563;
            font-weight: 500;
        }
        .capture-line {
            flex: 1;
            height: 1px;
            background: rgba(167, 139, 250, 0.15);
        }
        .capture-card {
            background: rgba(167, 139, 250, 0.06);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 8px;
        }
        .capture-card-name {
            font-weight: 600;
            color: #e8eaed;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }
        .capture-card-notes {
            font-size: 0.825rem;
            color: #9ca3af;
            line-height: 1.55;
            white-space: pre-wrap;
        }
        .capture-card-action {
            display: inline-block;
            font-size: 0.72rem;
            color: #a78bfa;
            background: rgba(167, 139, 250, 0.1);
            border: 1px solid rgba(167, 139, 250, 0.25);
            border-radius: 999px;
            padding: 2px 8px;
            margin-top: 8px;
        }

        /* Divider */
        .section-divider {
            height: 1px;
            background: rgba(99, 102, 241, 0.1);
            margin: 36px 0;
        }

        /* Section title */
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #e8eaed;
            margin-bottom: 4px;
        }
        .section-subtitle { font-size: 0.825rem; color: #6b7280; margin-bottom: 20px; }

        /* Bills */
        .bills-category-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6366f1;
            margin: 28px 0 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .bills-category-label:first-child { margin-top: 0; }
        .bills-category-label-line { flex: 1; height: 1px; background: rgba(99, 102, 241, 0.15); }
        .bill-cat-est { font-size: 0.72rem; color: #4b5563; font-weight: 500; }

        .bill-row {
            display: flex;
            align-items: flex-start;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.45);
            border: 1px solid rgba(99, 102, 241, 0.12);
            border-radius: 10px;
            margin-bottom: 6px;
            gap: 12px;
            transition: border-color 0.2s, background 0.2s;
        }
        .bill-row:hover { border-color: rgba(99, 102, 241, 0.25); background: rgba(15, 23, 42, 0.65); }
        .bill-row.cancelled { opacity: 0.5; }
        .bill-name  { font-weight: 600; color: #e8eaed; font-size: 0.9rem; }
        .bill-sub   { font-size: 0.775rem; color: #6b7280; margin-top: 2px; }
        .bill-note  { font-size: 0.775rem; color: #9ca3af; margin-top: 4px; line-height: 1.4; }
        .bill-middle { flex: 1; min-width: 0; }
        .bill-right { text-align: right; flex-shrink: 0; }
        .bill-due-date { font-size: 0.8rem; color: #c7d2fe; white-space: nowrap; font-weight: 500; }
        .bill-due-rel  { font-size: 0.72rem; color: #4b5563; margin-top: 2px; }
        .bill-amount   { font-weight: 700; color: #e8eaed; font-size: 0.9rem; margin-top: 4px; }
        .bill-amount.zero { color: #4b5563; font-weight: 500; }

        /* Utility summary mini cards */
        .util-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 8px;
            margin: 8px 0 10px 0;
        }
        .util-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(99, 102, 241, 0.18);
            border-radius: 8px;
            padding: 10px 12px;
        }
        .util-card-label { font-size: 0.72rem; color: #6b7280; margin-bottom: 3px; }
        .util-card-value { font-weight: 700; color: #e8eaed; font-size: 0.95rem; }
        .util-card-sub   { font-size: 0.72rem; color: #6b7280; margin-top: 1px; }
        .util-link { font-size: 0.8rem; color: #818cf8; text-decoration: none; font-weight: 500; }
        .util-link:hover { text-decoration: underline; }
        .util-section-title { font-size: 0.78rem; color: #6b7280; margin-bottom: 6px; margin-top: 14px; letter-spacing: 0.01em; }

        .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }

        /* Collapsible time groups */
        .group-section { margin-bottom: 6px; }
        .group-header {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            padding: 8px 2px;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .group-header:hover { background: rgba(99, 102, 241, 0.06); }
        .group-toggle {
            font-size: 0.6rem;
            color: #6366f1;
            transition: transform 0.2s;
            width: 12px;
            flex-shrink: 0;
            display: inline-block;
        }
        .group-header.is-collapsed .group-toggle { transform: rotate(-90deg); }
        .group-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .group-line { flex: 1; height: 1px; background: rgba(99, 102, 241, 0.13); }
        .group-count { font-size: 0.72rem; color: #4b5563; font-weight: 500; }
        .group-body {
            overflow: hidden;
            transition: max-height 0.28s ease, opacity 0.18s ease;
            max-height: 9999px;
            opacity: 1;
        }
        .group-body.is-collapsed { max-height: 0 !important; opacity: 0; }

        /* Mind Dump */
        .mind-dump-wrap {
            margin-top: 44px;
            padding-top: 28px;
            border-top: 1px solid rgba(99, 102, 241, 0.15);
        }
        .mind-dump-header {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            padding: 4px 2px 10px;
        }
        .mind-dump-toggle {
            font-size: 0.6rem;
            color: #6366f1;
            transition: transform 0.2s;
            width: 12px;
            flex-shrink: 0;
            display: inline-block;
        }
        .mind-dump-wrap.is-collapsed .mind-dump-toggle { transform: rotate(-90deg); }
        .mind-dump-title {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6366f1;
        }
        .mind-dump-line { flex: 1; height: 1px; background: rgba(99, 102, 241, 0.13); }
        .mind-dump-body {
            overflow: hidden;
            transition: max-height 0.28s ease;
            max-height: 600px;
        }
        .mind-dump-wrap.is-collapsed .mind-dump-body { max-height: 0; }
        .mind-dump-textarea {
            width: 100%;
            min-height: 200px;
            background: rgba(15, 23, 42, 0.45);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 10px;
            color: #e8eaed;
            font-family: inherit;
            font-size: 0.875rem;
            line-height: 1.65;
            padding: 14px 16px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }
        .mind-dump-textarea::placeholder { color: #374151; }
        .mind-dump-textarea:focus { border-color: rgba(99, 102, 241, 0.45); }
        .mind-dump-saved { font-size: 0.72rem; color: #4b5563; margin-top: 6px; min-height: 16px; }

        @media print {
            body, body::before { background: none !important; color: #000 !important; }
            .container { max-width: 100%; padding: 0; }
            .back-link, .controls { display: none !important; }
            header h1 { color: #000 !important; font-size: 1.4rem; }
            header p, .section-subtitle, .count-note { color: #555 !important; }

            .reminder-row, .bill-row, .util-card {
                background: none !important;
                border: 1px solid #ccc !important;
                border-left-width: 1px !important;
                box-shadow: none !important;
                break-inside: avoid;
            }
            .reminder-row.status-overdue,
            .reminder-row.status-soon,
            .reminder-row.status-ok { border-left: 3px solid #000 !important; }

            .reminder-name, .bill-name, .section-title,
            .reminder-date, .bill-due-date, .bill-amount { color: #000 !important; }
            .reminder-meta, .reminder-notes, .bill-sub, .bill-note,
            .reminder-days, .bill-due-rel, .bill-cat-est,
            .util-card-label, .util-card-sub, .util-section-title,
            .section-subtitle, .month-label-count { color: #555 !important; }
            .util-card-value { color: #000 !important; }

            .reminder-dot { background: #000 !important; }
            .reminder-action-pill {
                background: none !important;
                border: 1px solid #999 !important;
                color: #000 !important;
            }
            .badge {
                background: none !important;
                border: 1px solid #999 !important;
                color: #000 !important;
            }
            .month-label-text, .bills-category-label { color: #000 !important; }
            .month-label-line, .bills-category-label-line { background: #ccc !important; }
            .section-divider { background: #ccc !important; }
            .util-link { color: #000 !important; }
            .bill-amount.zero { color: #555 !important; }
            .bill-row.cancelled { opacity: 0.6 !important; }
            .month-section { break-inside: avoid; }

            /* Expand all collapsed groups for print */
            .group-body.is-collapsed {
                max-height: 9999px !important;
                opacity: 1 !important;
            }
            .mind-dump-wrap.is-collapsed .mind-dump-body {
                max-height: 9999px !important;
            }
            .group-toggle, .mind-dump-toggle { display: none !important; }
            .group-label, .mind-dump-title { color: #000 !important; }
            .group-line, .mind-dump-line { background: #ccc !important; }
            .group-count { color: #555 !important; }
            .mind-dump-textarea {
                background: none !important;
                border: 1px solid #ccc !important;
                color: #000 !important;
                resize: none !important;
                min-height: unset !important;
            }
            .mind-dump-saved { display: none !important; }
            .capture-card {
                background: none !important;
                border: 1px solid #ccc !important;
            }
            .capture-card-name { color: #000 !important; }
            .capture-card-notes { color: #444 !important; }
            .capture-card-action { color: #000 !important; background: none !important; border-color: #999 !important; }
            .capture-title { color: #000 !important; }
            .capture-date { color: #555 !important; }
            .capture-line { background: #ccc !important; }
        }
        </style>
    </head>
    <body>
        <div class="container">
            <a href="../index.html" class="back-link">← LifeOS</a>

            <header>
                <h1>Reminders & Upkeep</h1>
                <p>Subscriptions, renewals, and action items</p>
            </header>

            <div id="captureSection"></div>

            <div class="controls">
                <input id="searchInput" type="search" placeholder="Search...">
                <select id="statusFilter">
                    <option value="all">All statuses</option>
                    <option value="soon">Due soon</option>
                    <option value="overdue">Overdue</option>
                    <option value="ok">OK</option>
                </select>
                <button onclick="window.print()" style="background:rgba(15,23,42,0.6);border:1px solid rgba(99,102,241,0.2);color:#9ca3af;padding:8px 14px;border-radius:8px;font-size:0.875rem;font-family:inherit;cursor:pointer;transition:border-color 0.2s,color 0.2s;" onmouseover="this.style.borderColor='rgba(99,102,241,0.5)';this.style.color='#e8eaed'" onmouseout="this.style.borderColor='rgba(99,102,241,0.2)';this.style.color='#9ca3af'">Print</button>
            </div>

            <div id="remindersSection"></div>
            <div class="count-note" id="countNote"></div>

            <div class="section-divider"></div>

            <div class="section-title">Bills</div>
            <div class="section-subtitle" id="billsSummary"></div>
            <div id="billsContainer"></div>

            <div class="mind-dump-wrap" id="mindDumpWrap">
                <div class="mind-dump-header" id="mindDumpHeader">
                    <span class="mind-dump-toggle">▼</span>
                    <span class="mind-dump-title">Mind Dump</span>
                    <div class="mind-dump-line"></div>
                </div>
                <div class="mind-dump-body">
                    <textarea id="mindDumpText" class="mind-dump-textarea" placeholder="Dump thoughts here — sort later..."></textarea>
                    <div class="mind-dump-saved" id="mindDumpSaved"></div>
                </div>
            </div>
        </div>

        <script>
        const DATA_URL  = '../data/reminders.json';
        const BILLS_URL = '../data/bills.json';

        class RemindersPage {
            constructor() {
                this.all = [];
                this.bills = null;
                this.init();
            }

            async init() {
                await Promise.all([this.loadData(), this.loadBills()]);
                document.getElementById('searchInput').addEventListener('input', () => this.render());
                document.getElementById('statusFilter').addEventListener('change', () => this.render());
                this.renderCapture();
                this.render();
                this.renderBills();
                this.initMindDump();
            }

            async loadData() {
                try {
                    const res = await fetch(DATA_URL);
                    if (!res.ok) throw new Error(res.statusText);
                    this.all = await res.json();
                } catch (e) {
                    document.getElementById('remindersSection').innerHTML = '<div class="empty">Failed to load reminders.</div>';
                }
            }

            async loadBills() {
                try {
                    const res = await fetch(BILLS_URL);
                    if (!res.ok) throw new Error(res.statusText);
                    this.bills = await res.json();
                } catch (e) {
                    document.getElementById('billsContainer').innerHTML = '<div class="empty">Failed to load bills.</div>';
                }
            }

            renderCapture() {
                const today = new Date();
                const todayStr = today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
                const todayKey = today.toISOString().slice(0, 10);

                const items = this.all.filter(i => i.category === 'scratch');
                const el = document.getElementById('captureSection');
                if (!items.length) { el.innerHTML = ''; return; }

                const cards = items.map(i => `
                    <div class="capture-card">
                        <div class="capture-card-name">${this.escape(i.name || 'Untitled')}</div>
                        ${i.notes ? `<div class="capture-card-notes">${this.escape(i.notes).replace(/\n/g, '<br>')}</div>` : ''}
                        ${i.desiredAction ? `<span class="capture-card-action">${this.escape(i.desiredAction)}</span>` : ''}
                    </div>
                `).join('');

                el.innerHTML = `
                    <div class="capture-section">
                        <div class="capture-header">
                            <span class="capture-title">Today's Capture</span>
                            <span class="capture-date">${this.escape(todayStr)}</span>
                            <div class="capture-line"></div>
                        </div>
                        ${cards}
                    </div>
                `;
            }

            computeItem(item) {
                const now = new Date();
                const renew = item.renewsOn ? new Date(item.renewsOn + 'T00:00:00') : null;
                const actionDate = item.actionOnOrAfter ? new Date(item.actionOnOrAfter + 'T00:00:00') : null;
                const nextDate = renew || actionDate || null;
                const daysUntil = nextDate ? Math.ceil((nextDate - now) / (1000 * 60 * 60 * 24)) : null;
                let status = 'ok';
                if (nextDate) {
                    if (daysUntil < 0) status = 'overdue';
                    else if (typeof item.notifyDaysBefore === 'number' && daysUntil <= item.notifyDaysBefore) status = 'soon';
                }
                return { ...item, nextDate, daysUntil, status };
            }

            render() {
                const q = (document.getElementById('searchInput').value || '').toLowerCase();
                const statusFilter = document.getElementById('statusFilter').value;

                let items = this.all.map(i => this.computeItem(i)).filter(r => {
                    if (r.category === 'scratch') return false;
                    const matchesQ = !q || (r.name?.toLowerCase().includes(q) || r.vendor?.toLowerCase().includes(q));
                    const matchesStatus = statusFilter === 'all' || r.status === statusFilter;
                    return matchesQ && matchesStatus;
                });

                items.sort((a, b) => {
                    if (!a.nextDate && !b.nextDate) return 0;
                    if (!a.nextDate) return 1;
                    if (!b.nextDate) return -1;
                    return a.nextDate - b.nextDate;
                });

                const groupDefs = [
                    { key: 'overdue',     label: 'Overdue',     color: '#ef4444' },
                    { key: 'today',       label: 'Today',       color: '#fbbf24' },
                    { key: 'this-week',   label: 'This Week',   color: '#818cf8' },
                    { key: 'this-month',  label: 'This Month',  color: '#6366f1' },
                    { key: 'later',       label: 'Later',       color: '#4b5563' },
                    { key: 'no-date',     label: 'No Date',     color: '#4b5563' },
                ];
                const buckets = {};
                for (const g of groupDefs) buckets[g.key] = [];
                for (const item of items) buckets[this.getTimeGroup(item.daysUntil)].push(item);

                const section = document.getElementById('remindersSection');
                const countNote = document.getElementById('countNote');

                if (!items.length) {
                    section.innerHTML = '<div class="empty">No items found.</div>';
                    countNote.textContent = '';
                    return;
                }

                let html = '';
                for (const g of groupDefs) {
                    const groupItems = buckets[g.key];
                    if (!groupItems.length) continue;
                    const collapsed = localStorage.getItem(`reminders_grp_${g.key}`) === '1';
                    html += `
                        <div class="group-section">
                            <div class="group-header${collapsed ? ' is-collapsed' : ''}" data-gkey="${g.key}">
                                <span class="group-toggle">▼</span>
                                <span class="group-label" style="color:${g.color}">${g.label}</span>
                                <div class="group-line"></div>
                                <span class="group-count">${groupItems.length}</span>
                            </div>
                            <div class="group-body${collapsed ? ' is-collapsed' : ''}">
                                ${groupItems.map(r => this.renderRow(r)).join('')}
                            </div>
                        </div>
                    `;
                }

                section.innerHTML = html;
                countNote.textContent = `${items.length} item${items.length === 1 ? '' : 's'}`;

                section.querySelectorAll('.group-header').forEach(h => {
                    h.addEventListener('click', () => {
                        h.classList.toggle('is-collapsed');
                        h.nextElementSibling.classList.toggle('is-collapsed');
                        localStorage.setItem(`reminders_grp_${h.dataset.gkey}`, h.classList.contains('is-collapsed') ? '1' : '0');
                    });
                });
            }

            getTimeGroup(daysUntil) {
                if (daysUntil === null) return 'no-date';
                if (daysUntil < 0)  return 'overdue';
                if (daysUntil === 0) return 'today';
                if (daysUntil <= 7)  return 'this-week';
                if (daysUntil <= 30) return 'this-month';
                return 'later';
            }

            initMindDump() {
                const wrap   = document.getElementById('mindDumpWrap');
                const header = document.getElementById('mindDumpHeader');
                const ta     = document.getElementById('mindDumpText');
                const saved  = document.getElementById('mindDumpSaved');

                ta.value = localStorage.getItem('lifeos_mind_dump') || '';
                if (localStorage.getItem('reminders_mindDump_collapsed') === '1') wrap.classList.add('is-collapsed');

                header.addEventListener('click', () => {
                    wrap.classList.toggle('is-collapsed');
                    localStorage.setItem('reminders_mindDump_collapsed', wrap.classList.contains('is-collapsed') ? '1' : '0');
                });

                let timer;
                ta.addEventListener('input', () => {
                    clearTimeout(timer);
                    timer = setTimeout(() => {
                        localStorage.setItem('lifeos_mind_dump', ta.value);
                        saved.textContent = 'Saved';
                        setTimeout(() => { saved.textContent = ''; }, 2000);
                    }, 600);
                });
            }

            renderRow(r) {
                const dateStr = r.nextDate
                    ? r.nextDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
                    : '—';
                const daysText = r.daysUntil !== null
                    ? (r.daysUntil === 0 ? 'today' : r.daysUntil > 0 ? `in ${r.daysUntil}d` : `${Math.abs(r.daysUntil)}d ago`)
                    : '';
                const dotClass = `dot-${r.status}`;
                const rowClass = `status-${r.status}`;
                const badgeClass = `badge-${r.status}`;
                const badgeLabel = r.status === 'overdue' ? 'Overdue' : r.status === 'soon' ? 'Due soon' : 'OK';
                const daysClass = r.status === 'soon' ? 'soon' : r.status === 'overdue' ? 'overdue' : '';

                const metaParts = [r.vendor, r.planName, r.billingPeriod].filter(Boolean).map(s => this.escape(s));
                const meta = metaParts.join(' · ');

                return `
                    <div class="reminder-row ${rowClass}">
                        <div class="reminder-dot ${dotClass}"></div>
                        <div class="reminder-main">
                            <div class="reminder-name">${this.escape(r.name || '')}</div>
                            ${meta ? `<div class="reminder-meta">${meta}</div>` : ''}
                            ${r.notes ? `<div class="reminder-notes">${this.escape(r.notes)}</div>` : ''}
                            ${r.desiredAction ? `<span class="reminder-action-pill">${this.escape(r.desiredAction)}</span>` : ''}
                        </div>
                        <div class="reminder-right">
                            <div class="reminder-date">${dateStr}</div>
                            <div class="reminder-days ${daysClass}">${daysText}</div>
                            <div><span class="badge ${badgeClass}">${badgeLabel}</span></div>
                        </div>
                    </div>
                `;
            }

            // ---- Bills ----
            renderBills() {
                if (!this.bills || !Array.isArray(this.bills.categories)) {
                    document.getElementById('billsContainer').innerHTML = '<div class="empty">No bills data.</div>';
                    return;
                }
                const now = new Date();
                let totalYearly = 0;
                let totalCount = 0;

                let html = '';
                for (const cat of this.bills.categories) {
                    const enriched = cat.items
                        .map(it => this.computeBillDates(it, now))
                        .sort((a, b) => {
                            if (!a.nextEstimatedDate && !b.nextEstimatedDate) return 0;
                            if (!a.nextEstimatedDate) return 1;
                            if (!b.nextEstimatedDate) return -1;
                            return a.nextEstimatedDate - b.nextEstimatedDate;
                        });
                    const catYearly = enriched.reduce((s, it) => s + this.estimateYearly(it.amount, it.frequency), 0);
                    totalYearly += catYearly;
                    totalCount += enriched.length;

                    html += `
                        <div class="bills-category-label">
                            ${this.escape(cat.title)}
                            <div class="bills-category-label-line"></div>
                            <span class="bill-cat-est">${this.formatCurrency(catYearly)}/yr</span>
                        </div>
                    `;

                    if (cat.title === 'Bills & Utilities') {
                        html += `
                            <div class="util-section-title">SCG Gas — Account 05000117275128</div>
                            <div class="util-grid">
                                <div class="util-card"><div class="util-card-label">Next bill due</div><div class="util-card-value">Dec 4, 2025</div><div class="util-card-sub">$67.55</div></div>
                                <div class="util-card"><div class="util-card-label">8-month avg</div><div class="util-card-value">$69.02</div></div>
                                <div class="util-card"><div class="util-card-label">3-month avg</div><div class="util-card-value">$54.19</div></div>
                                <div class="util-card"><div class="util-card-label">6-month avg</div><div class="util-card-value">$51.41</div></div>
                            </div>
                            <a href="./gas-bill-stats.html" class="util-link" style="display:inline-block;margin-bottom:14px;">View gas bill history →</a>

                            <div class="util-section-title">UI Electric — Account 01000020024211</div>
                            <div class="util-grid">
                                <div class="util-card"><div class="util-card-label">Last bill</div><div class="util-card-value">Nov 7, 2025</div><div class="util-card-sub">-$15.40 credit</div></div>
                                <div class="util-card"><div class="util-card-label">9-month avg</div><div class="util-card-value">$72.42</div></div>
                                <div class="util-card"><div class="util-card-label">3-month avg</div><div class="util-card-value">$78.04</div></div>
                                <div class="util-card"><div class="util-card-label">6-month avg</div><div class="util-card-value">$87.21</div></div>
                            </div>
                            <a href="./electric-bill-stats.html" class="util-link" style="display:inline-block;margin-bottom:14px;">View electric bill history →</a>
                        `;
                    }

                    for (const it of enriched) {
                        const dateStr = it.nextEstimatedDate ? this.formatDate(it.nextEstimatedDate) : '—';
                        const rel = it.dueRelative || '—';
                        const cancelled = it.amount === 0 && it.notes && /cancel/i.test(it.notes);
                        const amountClass = it.amount === 0 ? 'bill-amount zero' : 'bill-amount';
                        const amountStr = it.amount === 0 ? (cancelled ? 'Cancelled' : '$0') : this.formatCurrency(it.amount);
                        const subParts = [it.frequency, it.account].filter(Boolean).map(s => this.escape(s));
                        html += `
                            <div class="bill-row${cancelled ? ' cancelled' : ''}">
                                <div class="bill-middle">
                                    <div class="bill-name">${this.escape(it.name)}</div>
                                    <div class="bill-sub">${subParts.join(' · ')}</div>
                                    ${it.notes ? `<div class="bill-note">${this.escape(it.notes)}</div>` : ''}
                                </div>
                                <div class="bill-right">
                                    <div class="bill-due-date">${dateStr}</div>
                                    <div class="bill-due-rel">${this.escape(rel)}</div>
                                    <div class="${amountClass}">${amountStr}</div>
                                </div>
                            </div>
                        `;
                    }
                }

                document.getElementById('billsSummary').textContent = `${totalCount} items · est ${this.formatCurrency(totalYearly)}/yr`;
                document.getElementById('billsContainer').innerHTML = html;
            }

            computeBillDates(item, now) {
                const periodDays = this.periodDays(item.frequency);
                const generatedAt = this.bills?.generatedAt ? new Date(this.bills.generatedAt + 'T00:00:00') : null;

                if (item.nextDueOn) {
                    let next = new Date(item.nextDueOn + 'T00:00:00');
                    if (isFinite(next)) {
                        if (periodDays > 0) while (next < now) next = new Date(next.getTime() + periodDays * 86400000);
                        return { ...item, nextEstimatedDate: next, dueRelative: this.relativeFromNow(next) };
                    }
                }

                if (item.billingDayOfMonth && /monthly|quarterly|yearly|annually/i.test(String(item.frequency || ''))) {
                    const day = Math.max(1, Math.min(28, Number(item.billingDayOfMonth)));
                    let candidate = new Date(now.getFullYear(), now.getMonth(), day);
                    if (candidate < new Date(now.getFullYear(), now.getMonth(), now.getDate())) {
                        if (/quarterly/i.test(item.frequency)) candidate = new Date(now.getFullYear(), now.getMonth() + 3, day);
                        else if (/yearly|annually/i.test(item.frequency)) candidate = new Date(now.getFullYear() + 1, now.getMonth(), day);
                        else candidate = new Date(now.getFullYear(), now.getMonth() + 1, day);
                    }
                    return { ...item, nextEstimatedDate: candidate, dueRelative: this.relativeFromNow(candidate) };
                }

                if (generatedAt && typeof item.dueInDays === 'number') {
                    let next = new Date(generatedAt.getTime() + item.dueInDays * 86400000);
                    if (periodDays > 0) while (next < now) next = new Date(next.getTime() + periodDays * 86400000);
                    return { ...item, nextEstimatedDate: next, dueRelative: this.relativeFromNow(next) };
                }

                return { ...item, nextEstimatedDate: null, dueRelative: '—' };
            }

            periodDays(f) {
                f = String(f || '').toLowerCase();
                if (f === 'weekly') return 7;
                if (f === 'monthly') return 30;
                if (f === 'quarterly') return 90;
                if (f === 'yearly' || f === 'annually') return 365;
                return 30;
            }

            estimateYearly(amount, f) {
                f = String(f || '').toLowerCase();
                if (f === 'weekly') return amount * 52;
                if (f === 'monthly') return amount * 12;
                if (f === 'quarterly') return amount * 4;
                if (f === 'yearly' || f === 'annually') return amount;
                return amount * 12;
            }

            formatDate(d) {
                return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            }

            relativeFromNow(target) {
                const diffDays = Math.round((target - new Date()) / 86400000);
                if (diffDays === 0) return 'today';
                if (diffDays > 0) return `in ${diffDays}d`;
                return `${Math.abs(diffDays)}d ago`;
            }

            formatCurrency(n) {
                return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 2 }).format(n || 0);
            }

            escape(text) {
                const d = document.createElement('div');
                d.textContent = String(text ?? '');
                return d.innerHTML;
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => new RemindersPage());
        } else {
            new RemindersPage();
        }
        </script>
    </body>
</html>
