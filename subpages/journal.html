<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal - LifeOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --color-text: #292929;
            --color-text-muted: #757575;
            --color-bg: #ffffff;
            --color-accent: #1a8917; /* Medium green */
            --font-serif: 'Lora', Georgia, serif;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --container-width: 720px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-sans);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .navbar {
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #f2f2f2;
        }

        .navbar-content {
            width: 100%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 22px;
            color: var(--color-text);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-link {
            font-size: 14px;
            color: var(--color-text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--color-text);
        }

        article.journal-container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 60px 20px 100px;
        }

        .journal-header {
            margin-bottom: 40px;
        }

        .journal-title {
            font-family: var(--font-sans);
            font-size: 42px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 12px;
            letter-spacing: -0.022em;
        }

        .journal-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 24px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: #f2f2f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--color-text-muted);
        }

        .author-info {
            display: flex;
            flex-direction: column;
            font-size: 14px;
        }

        .author-name {
            font-weight: 500;
            color: var(--color-text);
        }

        .publish-date {
            color: var(--color-text-muted);
        }

        .journal-content {
            font-family: var(--font-serif);
            font-size: 20px;
            line-height: 1.6;
            color: #292929;
        }

        /* Markdown Styling */
        .journal-content h1, 
        .journal-content h2, 
        .journal-content h3 {
            font-family: var(--font-sans);
            margin: 48px 0 16px;
            letter-spacing: -0.02em;
        }

        .journal-content h1 { font-size: 32px; }
        .journal-content h2 { font-size: 26px; }
        .journal-content h3 { font-size: 22px; }

        .journal-content p {
            margin-bottom: 24px;
        }

        .journal-content ul, 
        .journal-content ol {
            margin-left: 30px;
            margin-bottom: 24px;
        }

        .journal-content li {
            margin-bottom: 12px;
        }

        .journal-content blockquote {
            border-left: 3px solid var(--color-text);
            padding-left: 20px;
            margin-left: -23px;
            font-style: italic;
            color: var(--color-text-muted);
            margin-bottom: 24px;
        }

        .journal-content hr {
            border: none;
            border-top: 1px solid #f2f2f2;
            margin: 40px 0;
            text-align: center;
        }

        .journal-content hr::after {
            content: "...";
            display: inline-block;
            position: relative;
            top: -14px;
            background: #fff;
            padding: 0 10px;
            font-size: 24px;
            letter-spacing: 4px;
            color: var(--color-text-muted);
        }

        .journal-content img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin: 32px 0;
        }

        .journal-content code {
            background: #f2f2f2;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 0.85em;
        }

        .error-container {
            text-align: center;
            padding: 100px 20px;
        }

        .error-title {
            font-size: 24px;
            margin-bottom: 16px;
        }

        .loading-spinner {
            display: flex;
            justify-content: center;
            padding: 100px;
        }

        @media (max-width: 768px) {
            .journal-title {
                font-size: 32px;
            }
            .journal-content {
                font-size: 18px;
            }
            article.journal-container {
                padding-top: 40px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="../index.html" class="navbar-brand">LifeOS</a>
            <div class="navbar-actions">
                <a href="writing.html" class="back-link">Writing</a>
                <a href="../index.html" class="back-link">Home</a>
            </div>
        </div>
    </nav>

    <div id="loading" class="loading-spinner">
        <p>Reading...</p>
    </div>

    <div id="error" class="error-container" style="display: none;">
        <h2 class="error-title">Entry Not Found</h2>
        <p>We couldn't find the journal entry you're looking for.</p>
        <a href="../index.html" style="display: inline-block; margin-top: 20px; color: var(--color-accent);">Back to Home</a>
    </div>

    <article id="journalContainer" class="journal-container" style="display: none;">
        <header class="journal-header">
            <h1 id="title" class="journal-title"></h1>
            <div class="journal-meta">
                <div class="avatar">AG</div>
                <div class="author-info">
                    <span class="author-name">Alex G.</span>
                    <span id="date" class="publish-date"></span>
                </div>
            </div>
        </header>
        <div id="content" class="journal-content"></div>
    </article>

    <script>
        async function loadJournal() {
            const params = new URLSearchParams(window.location.search);
            const fileName = params.get('file');
            
            if (!fileName) {
                showError();
                return;
            }

            try {
                // Determine the correct path - if we are in subpages/, data is in ../data/journal/
                const path = `../data/journal/${fileName}`;
                const response = await fetch(path);
                
                if (!response.ok) throw new Error('File not found');
                
                const md = await response.text();
                renderMarkdown(md, fileName);
            } catch (error) {
                console.error('Error loading journal:', error);
                showError();
            }
        }

        function renderMarkdown(md, fileName) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('journalContainer').style.display = 'block';

            // Extract title from H1 if present, otherwise use filename
            let title = fileName.replace('.md', '').replace(/-/g, ' ');
            const h1Match = md.match(/^# (.*)$/m);
            if (h1Match) {
                title = h1Match[1];
                // Remove the H1 from the content to avoid duplication
                md = md.replace(/^# .*$/m, '');
            }

            // Extract date if present (Journal - May 5, 2026)
            let dateStr = 'Recently';
            const dateMatch = title.match(/(January|February|March|April|May|June|July|August|September|October|November|December) \d+, \d+/);
            if (dateMatch) {
                dateStr = dateMatch[0];
            } else {
                // Try to parse from filename YYYY-MM-DD
                const fileDateMatch = fileName.match(/(\d{4})-(\d{2})-(\d{2})/);
                if (fileDateMatch) {
                    const date = new Date(fileDateMatch[1], fileDateMatch[2] - 1, fileDateMatch[3]);
                    dateStr = date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                }
            }

            document.getElementById('title').textContent = title;
            document.getElementById('date').textContent = dateStr;
            document.title = `${title} - LifeOS Journal`;

            // Render content
            marked.setOptions({
                breaks: true,
                gfm: true
            });
            document.getElementById('content').innerHTML = marked.parse(md);
        }

        function showError() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
        }

        loadJournal();
    </script>
</body>
</html>
